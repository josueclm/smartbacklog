<head>

   <meta charset="utf-8"/>

   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

   <title>Smartbacklog</title>

   <!-- TAILWIND -->
   <script src="https://cdn.tailwindcss.com"></script>

   <!-- GOOGLE FONTS -->
   <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
   />

   <!-- ICONS -->
   <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1"
      rel="stylesheet"
   />

   <!-- GLOBAL CSS -->
   <link rel="stylesheet" href="../styles/global.css">

         <script id="tailwind-config">
         tailwind.config = {
           darkMode: "class",
           theme: {
             extend: {
               "colors": {
                       "secondary": "#4f5f7b",
                       "secondary-fixed-dim": "#b7c7e8",
                       "outline-variant": "#c3c6d6",
                       "tertiary-container": "#a33500",
                       "error-container": "#ffdad6",
                       "inverse-on-surface": "#edf0ff",
                       "primary-fixed": "#dae2ff",
                       "primary": "#003d9b",
                       "secondary-fixed": "#d6e3ff",
                       "background": "#faf9ff",
                       "on-tertiary": "#ffffff",
                       "surface-container-high": "#e1e8ff",
                       "on-secondary-fixed-variant": "#374763",
                       "on-secondary": "#ffffff",
                       "on-primary-fixed": "#001848",
                       "surface": "#faf9ff",
                       "inverse-surface": "#1d3054",
                       "tertiary-fixed": "#ffdbcf",
                       "on-primary": "#ffffff",
                       "on-error": "#ffffff",
                       "on-secondary-fixed": "#091c35",
                       "inverse-primary": "#b2c5ff",
                       "surface-variant": "#d8e2ff",
                       "tertiary": "#7b2600",
                       "surface-container": "#e9edff",
                       "surface-bright": "#faf9ff",
                       "on-tertiary-container": "#ffc6b2",
                       "surface-dim": "#ccdaff",
                       "on-background": "#051a3e",
                       "surface-tint": "#0c56d0",
                       "primary-fixed-dim": "#b2c5ff",
                       "on-primary-fixed-variant": "#0040a2",
                       "outline": "#737685",
                       "on-secondary-container": "#51617e",
                       "tertiary-fixed-dim": "#ffb59b",
                       "error": "#ba1a1a",
                       "surface-container-lowest": "#ffffff",
                       "secondary-container": "#cdddff",
                       "on-surface-variant": "#434654",
                       "surface-container-highest": "#d8e2ff",
                       "on-tertiary-fixed-variant": "#812800",
                       "on-tertiary-fixed": "#380d00",
                       "surface-container-low": "#f1f3ff",
                       "on-error-container": "#93000a",
                       "on-primary-container": "#c4d2ff",
                       "primary-container": "#0052cc",
                       "on-surface": "#051a3e"
               },
               "borderRadius": {
                       "DEFAULT": "0.5rem",
                       "lg": "1rem",
                       "xl": "1.25rem",
                       "full": "9999px"
               },
               "fontFamily": {
                       "headline": ["Manrope"],
                       "body": ["Inter"],
                       "label": ["Inter"]
               }
             },
           },
         }
      </script>
      <style>
         .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
         .no-scrollbar::-webkit-scrollbar { display: none; }
         .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
         .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
         .skeleton { background: linear-gradient(90deg, #f1f3ff 25%, #e1e8ff 50%, #f1f3ff 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
         @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }
      </style>
      <script defer="" src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

   <!-- SIDEBAR -->
   <div id="sidebar-container"></div>

   <!-- HEADER -->
   <div id="header-container"></div>


   <!-- MAIN -->
   <main class="lg:pl-64 pt-16">
      <div class="max-w-7xl mx-auto"> 
         <div class="p-8 max-w-[1600px] mx-auto w-full space-y-8">
            <!-- conteúdo do projeto -->

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
               <div>
                  <h2 class="font-headline font-extrabold text-3xl text-on-surface tracking-tight">Projetos</h2>
                  <p class="text-on-surface-variant mt-1 font-medium">Gestão e acompanhamento centralizado da organização</p>
               </div>
               <button id="btn_add_project" @click="showNewProjectModal = true" class="bg-primary text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-primary/10 hover:shadow-primary/20 transition-all hover:scale-[1.02]">
               <span class="material-symbols-outlined">add_circle</span> Novo Projeto
               </button>
            </div>


            <section class="space-y-6">
               <div class="flex items-center justify-between">
                  <h3 class="font-headline font-bold text-xl text-on-surface">Todos os Projetos <span class="ml-2 px-3 py-1 bg-surface-container rounded-full text-xs font-bold text-on-surface-variant"></span></h3>
               </div>

               <div
                  id="projects_container"
                  class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"
               ></div>
               
               
               <!-- Empty State Example -->
               <div class="hidden flex-col items-center justify-center py-20 bg-surface-container-lowest rounded-3xl border-2 border-dashed border-outline-variant/30">
                  <div class="w-24 h-24 bg-surface-container rounded-full flex items-center justify-center mb-6">
                     <span class="material-symbols-outlined text-5xl text-on-surface-variant/30">folder_open</span>
                  </div>
                  <h4 class="text-xl font-headline font-bold text-on-surface">Nenhum projeto encontrado</h4>
                  <p class="text-on-surface-variant mt-2 max-w-xs text-center">Tente ajustar seus filtros ou crie um novo projeto para começar.</p>
                  <button id="btn_add_project" @click="showNewProjectModal = true" class="mt-6 px-6 py-3 bg-primary text-white rounded-xl font-bold flex items-center gap-2">
                  <span class="material-symbols-outlined">add</span> Novo Projeto
                  </button>
               </div>
            </section>
         </div>
      </div>
   </main>


   <!-- PROJECT MODAL -->
<div
   id="project_modal"
   class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"
>

   <div class="bg-white rounded-2xl w-full max-w-lg p-6">

      <div class="flex items-center justify-between mb-6">

         <h3
            id="project_modal_title"
            class="text-xl font-bold"
         >
            Novo Projeto
         </h3>

         <button id="btn_close_project_modal">
            ✕
         </button>

      </div>

      <form id="project_form" class="space-y-4">

         <input
            type="hidden"
            id="project_id"
         >

         <div>

            <label class="text-sm font-bold">
               Nome
            </label>

            <input
               id="project_name"
               type="text"
               required
               class="w-full mt-1 border rounded-xl px-4 py-3"
            >

         </div>

         <div>

            <label class="text-sm font-bold">
               Descrição
            </label>

            <textarea
               id="project_description"
               rows="4"
               class="w-full mt-1 border rounded-xl px-4 py-3"
            ></textarea>

         </div>

         <button
            type="submit"
            class="w-full bg-primary text-white py-3 rounded-xl font-bold"
         >
            Guardar Projeto
         </button>

      </form>

   </div>

</div>

   <script type="module" src="../scripts/layout.js"></script>
   <script type="module" src="../scripts/utils.js"></script>
   <script type="module" src="../scripts/project.js"></script>

</body>
